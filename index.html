<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andrew Coulson</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Forum&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --fg: #1a1a1a;
      --muted: #c8c2b4;
      --accent: #8b5e3c;
    }

    body {
      background: #ffffff;
      color: var(--fg);
      font-family: 'Forum', Georgia, serif;
      font-weight: 300;
      height: 100svh;
      display: flex;
      align-items: stretch;
    }

    .photo {
      flex-shrink: 0;
      height: 100svh;
    }

    .photo img {
      height: 100%;
      width: auto;
      display: block;
    }

    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem;
      animation: appear 0.5s ease both;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: clamp(1.6rem, 2.5vw, 2.25rem);
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 1.25rem;
    }

    h1::after {
      content: '_';
      color: var(--accent);
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    hr {
      border: none;
      border-top: 1px solid var(--muted);
      margin-bottom: 1.25rem;
    }

    .tagline {
      font-size: 0.95rem;
      font-style: italic;
      color: var(--accent);
      margin-bottom: 2.5rem;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .nav-item {
      position: relative;
    }

    .nav-label {
      font-size: 1rem;
      letter-spacing: 0.06em;
      opacity: 0.45;
      cursor: default;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .nav-label::after {
      content: '›';
      color: var(--accent);
      font-size: 1rem;
      line-height: 1;
    }

    .nav-item:hover .nav-label {
      opacity: 1;
    }

    .flyout {
      position: absolute;
      left: calc(100% + 1rem);
      top: 0;
      transform: translateX(-4px);
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s, transform 0.15s;
    }

    .nav-item:hover .flyout {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    .flyout a {
      color: var(--fg);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      opacity: 0.4;
      transition: opacity 0.15s;
    }

    .flyout a:hover {
      opacity: 1;
    }

    @media (max-width: 640px) {
      body { flex-direction: column; height: auto; }
      .photo { height: 60svw; width: 100%; }
      .photo img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
      main { padding: 2.5rem 2rem; }
    }
  </style>
</head>
<body>
  <div class="photo">
    <img src="home.jpg" alt="">
  </div>
  <main>
    <h1>werdna.xyz</h1>
    <hr>
    <p class="tagline">A website for personal stuff.</p>
    <div class="nav">
      <div class="nav-item">
        <span class="nav-label">Contact</span>
        <ul class="flyout">
          <li><a href="mailto:andrew@werdna.xyz">email</a></li>
        </ul>
      </div>
      <div class="nav-item">
        <span class="nav-label">Bible Studies</span>
        <ul class="flyout">
          <li><a href="#">Matthew</a></li>
        </ul>
      </div>
    </div>
  </main>
</body>
</html>
