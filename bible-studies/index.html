<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bible Studies</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      padding-top: 3rem;
    }
    .hero {
      position: relative;
    }
    .img-main {
      display: block;
      width: 320px;
      position: relative;
      z-index: 2;
    }
    .shadow-clip {
      position: absolute;
      top: 0;
      left: 0;
      clip-path: inset(62% -60px -60px -60px);
      z-index: 0;
    }
    .img-shadow {
      display: block;
      width: 320px;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.4));
    }
    .divider {
      position: absolute;
      top: 62%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 25vw;
      border: none;
      border-top: 5px solid black;
      margin: 0;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="shadow-clip">
      <img src="../boy.png" alt="" class="img-shadow">
    </div>
    <hr class="divider">
    <img src="../boy.png" alt="" class="img-main">
  </div>
</body>
</html>
