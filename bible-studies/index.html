<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bible Studies</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      padding-top: 3rem;
    }
    .hero {
      position: relative;
    }
    img {
      display: block;
      width: 320px;
      position: relative;
      z-index: 1;
    }
    .divider {
      position: absolute;
      top: 62%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 25vw;
      border: none;
      border-top: 5px solid black;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="hero">
    <img src="../boy.png" alt="">
    <hr class="divider">
  </div>
</body>
</html>
