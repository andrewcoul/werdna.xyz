<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bible Studies</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Forum&display=swap">
  <style>
    a:visited { color: inherit; }
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 3rem;
      font-family: 'Forum', Georgia, serif;
      color: #1a1a1a;
    }
    h1 {
      font-size: clamp(1.6rem, 2.5vw, 2.25rem);
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-top: 1.25rem;
    }
    hr.section {
      border: none;
      border-top: 1px solid #c8c2b4;
      margin-top: -0.4rem;
      width: 320px;
    }
    .tagline {
      font-size: 0.95rem;
      font-style: italic;
      color: #8b5e3c;
      margin-top: 0.1rem;
    }
    h1::after {
      content: '_';
      color: #8b5e3c;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    .hero {
      position: relative;
    }
    .img-main {
      display: block;
      width: 320px;
      position: relative;
      z-index: 2;
    }
    .shadow-clip {
      position: absolute;
      top: 0;
      left: 0;
      clip-path: inset(62% -60px -60px -60px);
      z-index: 0;
    }
    .img-shadow {
      display: block;
      width: 320px;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.4));
    }
    .lists {
      display: flex;
      gap: 0;
      width: 320px;
      margin-top: 1.5rem;
    }
    .list-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .list-col h2 {
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8b5e3c;
      margin-bottom: 0.4rem;
    }
    .list-col ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .list-col a {
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      color: #1a1a1a;
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    .list-col a:hover {
      opacity: 1;
    }
    .divider {
      position: absolute;
      top: 62%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 25vw;
      border: none;
      border-top: 5px solid black;
      margin: 0;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="shadow-clip">
      <img src="../boy.png" alt="" class="img-shadow">
    </div>
    <hr class="divider">
    <a href="../index.html"><img src="../boy.png" alt="" class="img-main"></a>
  </div>
  <h1>Bible Studies</h1>
  <hr class="section">
  <p class="tagline">Notes from my studies.</p>
  <div class="lists">
    <div class="list-col">
      <h2>Books</h2>
      <ul>
        <li><a href="matthew.html">Matthew</a></li>
      </ul>
    </div>
    <div class="list-col">
      <h2>Topics</h2>
      <ul>
        <li><a href="eucharist.html">Eucharist</a></li>
      </ul>
    </div>
  </div>
</body>
</html>
